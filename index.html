<style>
/* ── SVGアイコン共通スタイル ── */
.ico { display:inline-block; vertical-align:middle; }
.ico use { display:block; }

:root {
  --void: #04020a;
  --deep: #0a0518;
  --rune-purple: #7b3ff5;
  --rune-glow:   #a855f7;
  --rune-bright: #d8b4fe;
  --gold:   #f5c842;
  --teal:   #22d3ee;
  --crimson:#ef4444;
  --green:  #4ade80;
  --amber:  #fbbf24;
  --text:   #e2d9f3;
  --dim:    #9d8cc0;
  --border: rgba(123,63,245,.3);
  --glow:   0 0 22px rgba(168,85,247,.4);
  --mono:   'Courier New', Courier, monospace;
  --serif:  Georgia, 'Times New Roman', serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--void);color:var(--text);font-family:var(--serif);overflow-x:hidden;}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,63,245,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(34,211,238,.06) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}
#stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.45;}

.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 20px 80px;}

/* ── HEADER ── */
header{text-align:center;margin-bottom:44px;}
.logo-wrap{
  display:inline-block;margin-bottom:12px;
  filter:drop-shadow(0 0 22px rgba(168,85,247,.9));
  animation:pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{filter:drop-shadow(0 0 22px rgba(168,85,247,.8));}
  50%{filter:drop-shadow(0 0 44px rgba(168,85,247,1)) drop-shadow(0 0 80px rgba(168,85,247,.45));}
}
h1{
  font-family:var(--serif);font-size:clamp(24px,5vw,44px);font-weight:700;letter-spacing:.18em;
  background:linear-gradient(135deg,var(--gold) 0%,var(--rune-bright) 45%,var(--teal) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtitle{font-style:italic;font-size:14px;color:var(--dim);margin-top:8px;}
.rune-divider{display:flex;align-items:center;gap:12px;margin:18px auto;max-width:340px;}
.rune-divider::before,.rune-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--rune-purple),transparent);}
.rune-divider-ico{display:flex;gap:8px;align-items:center;color:var(--rune-glow);}

/* ── PANEL ── */
.panel{
  background:linear-gradient(135deg,rgba(18,11,46,.93) 0%,rgba(10,5,24,.97) 100%);
  border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;
  box-shadow:var(--glow),inset 0 1px 0 rgba(168,85,247,.1);
}
.panel-title{
  font-family:var(--serif);font-size:10px;letter-spacing:.28em;
  color:var(--rune-glow);text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── TABS ── */
.tab-row{
  display:flex;gap:4px;background:rgba(10,5,24,.7);
  padding:4px;border-radius:10px;margin-bottom:16px;border:1px solid var(--border);
}
.tab{
  flex:1;padding:10px 6px;border:none;border-radius:7px;
  background:transparent;color:var(--dim);
  font-family:var(--serif);font-size:11px;letter-spacing:.07em;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.tab svg{opacity:.6;transition:opacity .2s;}
.tab.active{background:linear-gradient(135deg,rgba(109,40,217,.5),rgba(139,92,246,.3));color:var(--rune-bright);box-shadow:0 2px 10px rgba(109,40,217,.3);}
.tab.active svg{opacity:1;}
.tab-content{display:none;}.tab-content.active{display:block;}

/* ── DROP ZONE ── */
.drop-zone{
  border:2px dashed var(--border);border-radius:12px;padding:32px 20px;
  text-align:center;cursor:pointer;transition:all .3s;background:rgba(123,63,245,.03);
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--rune-glow);background:rgba(123,63,245,.09);box-shadow:var(--glow);}
.drop-ico{color:var(--rune-glow);margin-bottom:10px;transition:transform .3s;}
.drop-zone:hover .drop-ico{transform:scale(1.12) rotate(-6deg);}
.drop-text{font-size:15px;color:var(--dim);margin-bottom:5px;}
.drop-subtext{font-size:12px;color:rgba(157,140,192,.5);font-style:italic;}
input[type=file]{display:none;}

/* ── FILE INFO ── */
.file-info{display:none;align-items:center;gap:10px;padding:11px 13px;background:rgba(123,63,245,.1);border:1px solid var(--border);border-radius:9px;margin-top:10px;}
.file-info.visible{display:flex;}
.file-ico-wrap{flex-shrink:0;color:var(--rune-bright);}
.file-details{flex:1;min-width:0;}
.file-name{font-family:var(--mono);font-size:13px;color:var(--rune-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-meta{font-size:11px;color:var(--dim);margin-top:2px;}
.file-clear{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px;transition:color .2s;display:flex;align-items:center;}
.file-clear:hover{color:var(--crimson);}

/* ── CONTROLS ── */
.controls-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-top:16px;}
.control-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px;}
.control-label{font-size:10px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;font-family:var(--mono);}
select{background:rgba(10,5,24,.9);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;-webkit-appearance:none;appearance:none;cursor:pointer;transition:all .2s;width:100%;}
select:focus{outline:none;border-color:var(--rune-glow);box-shadow:0 0 10px rgba(168,85,247,.3);}
.select-wrapper{position:relative;}
.select-wrapper::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--rune-glow);pointer-events:none;font-size:13px;}

/* ── BUTTONS ── */
.btn{
  padding:10px 20px;border-radius:9px;border:none;
  font-family:var(--serif);font-size:12px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
}
.btn svg{flex-shrink:0;}
.btn-cast{background:linear-gradient(135deg,#6d28d9 0%,#7c3aed 60%,#8b5cf6 100%);color:#fff;box-shadow:0 4px 16px rgba(109,40,217,.5);}
.btn-cast:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 26px rgba(109,40,217,.7),0 0 34px rgba(168,85,247,.35);}
.btn-break{background:linear-gradient(135deg,#0e7490 0%,#0891b2 60%,#06b6d4 100%);color:#fff;box-shadow:0 4px 16px rgba(8,145,178,.5);}
.btn-break:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 26px rgba(8,145,178,.7),0 0 34px rgba(34,211,238,.35);}
.btn-secondary{background:rgba(123,63,245,.15);color:var(--rune-bright);border:1px solid var(--border);}
.btn-secondary:hover:not(:disabled){background:rgba(123,63,245,.28);border-color:var(--rune-glow);}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important;}

/* ── PROGRESS ── */
.progress-wrap{display:none;margin-top:13px;}.progress-wrap.visible{display:block;}
.progress-label{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:5px;display:flex;justify-content:space-between;}
.progress-bar-bg{height:4px;background:rgba(123,63,245,.2);border-radius:2px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--rune-purple),var(--teal));border-radius:2px;transition:width .3s;box-shadow:0 0 7px rgba(168,85,247,.6);}

/* ── OUTPUT ── */
.spell-output-section{display:none;}.spell-output-section.visible{display:block;}
.spell-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:8px;margin-bottom:13px;}
.stat-card{background:rgba(123,63,245,.08);border:1px solid rgba(123,63,245,.2);border-radius:8px;padding:8px 10px;text-align:center;}
.stat-value{font-family:var(--mono);font-size:13px;color:var(--rune-bright);display:block;word-break:break-all;}
.stat-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;}
.spell-textarea{width:100%;min-height:160px;background:rgba(4,2,10,.88);border:1px solid var(--border);border-radius:9px;color:var(--rune-glow);font-family:var(--mono);font-size:11px;line-height:1.7;padding:13px;resize:vertical;transition:border-color .2s;word-break:break-all;}
.spell-textarea:focus{outline:none;border-color:var(--rune-glow);}
.spell-textarea.decode-input{color:var(--teal);min-height:108px;}
.spell-actions{display:flex;gap:9px;margin-top:10px;flex-wrap:wrap;}

/* ── STATUS ── */
.status-msg{display:none;padding:10px 13px;border-radius:8px;font-family:var(--mono);font-size:12px;margin-top:10px;align-items:center;gap:8px;line-height:1.5;}
.status-msg.visible{display:flex;}
.status-msg svg{flex-shrink:0;}
.status-msg.success{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);}
.status-msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--crimson);}
.status-msg.info{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);color:var(--teal);}

/* ── RUNE PREVIEW ── */
.rune-preview{font-size:17px;letter-spacing:2px;color:var(--rune-glow);text-align:center;padding:8px;border-radius:8px;background:rgba(123,63,245,.05);border:1px solid rgba(123,63,245,.15);font-family:var(--mono);animation:rune-flicker 4s ease-in-out infinite;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:13px;}
@keyframes rune-flicker{0%,94%,100%{opacity:1;}97%{opacity:.62;}}

/* ── INSPECT TABLE ── */
.inspect-table{width:100%;border-collapse:collapse;}
.inspect-table tr{border-bottom:1px solid rgba(123,63,245,.12);}
.inspect-table td{padding:9px 11px;font-size:13px;}
.inspect-table td:first-child{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;width:42%;}
.inspect-table td:last-child{color:var(--rune-bright);font-family:var(--mono);}

/* ── PARTICLE ── */
.particle{position:fixed;pointer-events:none;z-index:9999;animation:float-up 1.4s ease-out forwards;}
@keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-72px) scale(.3);}}

::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--deep);}::-webkit-scrollbar-thumb{background:var(--rune-purple);border-radius:3px;}

footer{text-align:center;margin-top:54px;color:rgba(157,140,192,.36);font-size:12px;font-style:italic;}

@media(max-width:560px){
  .controls-row{flex-direction:column;}
  .btn{width:100%;justify-content:center;}
  .spell-actions{flex-direction:column;}
  .spell-actions .btn{width:100%;}
  h1{letter-spacing:.07em;}
  .tab span{display:none;}
}
</style>

</head>
