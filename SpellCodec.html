<style>
/* ── SVGアイコン共通スタイル ── */
.ico { display:inline-block; vertical-align:middle; }
.ico use { display:block; }

:root {
  --void: #04020a;
  --deep: #0a0518;
  --rune-purple: #7b3ff5;
  --rune-glow:   #a855f7;
  --rune-bright: #d8b4fe;
  --gold:   #f5c842;
  --teal:   #22d3ee;
  --crimson:#ef4444;
  --green:  #4ade80;
  --amber:  #fbbf24;
  --text:   #e2d9f3;
  --dim:    #9d8cc0;
  --border: rgba(123,63,245,.3);
  --glow:   0 0 22px rgba(168,85,247,.4);
  --mono:   'Courier New', Courier, monospace;
  --serif:  Georgia, 'Times New Roman', serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--void);color:var(--text);font-family:var(--serif);overflow-x:hidden;}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,63,245,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(34,211,238,.06) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}
#stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.45;}

.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 20px 80px;}

/* ── HEADER ── */
header{text-align:center;margin-bottom:44px;}
.logo-wrap{
  display:inline-block;margin-bottom:12px;
  filter:drop-shadow(0 0 22px rgba(168,85,247,.9));
  animation:pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{filter:drop-shadow(0 0 22px rgba(168,85,247,.8));}
  50%{filter:drop-shadow(0 0 44px rgba(168,85,247,1)) drop-shadow(0 0 80px rgba(168,85,247,.45));}
}
h1{
  font-family:var(--serif);font-size:clamp(24px,5vw,44px);font-weight:700;letter-spacing:.18em;
  background:linear-gradient(135deg,var(--gold) 0%,var(--rune-bright) 45%,var(--teal) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtitle{font-style:italic;font-size:14px;color:var(--dim);margin-top:8px;}
.rune-divider{display:flex;align-items:center;gap:12px;margin:18px auto;max-width:340px;}
.rune-divider::before,.rune-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--rune-purple),transparent);}
.rune-divider-ico{display:flex;gap:8px;align-items:center;color:var(--rune-glow);}

/* ── PANEL ── */
.panel{
  background:linear-gradient(135deg,rgba(18,11,46,.93) 0%,rgba(10,5,24,.97) 100%);
  border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;
  box-shadow:var(--glow),inset 0 1px 0 rgba(168,85,247,.1);
}
.panel-title{
  font-family:var(--serif);font-size:10px;letter-spacing:.28em;
  color:var(--rune-glow);text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── TABS ── */
.tab-row{
  display:flex;gap:4px;background:rgba(10,5,24,.7);
  padding:4px;border-radius:10px;margin-bottom:16px;border:1px solid var(--border);
}
.tab{
  flex:1;padding:10px 6px;border:none;border-radius:7px;
  background:transparent;color:var(--dim);
  font-family:var(--serif);font-size:11px;letter-spacing:.07em;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.tab svg{opacity:.6;transition:opacity .2s;}
.tab.active{background:linear-gradient(135deg,rgba(109,40,217,.5),rgba(139,92,246,.3));color:var(--rune-bright);box-shadow:0 2px 10px rgba(109,40,217,.3);}
.tab.active svg{opacity:1;}
.tab-content{display:none;}.tab-content.active{display:block;}

/* ── DROP ZONE ── */
.drop-zone{
  border:2px dashed var(--border);border-radius:12px;padding:32px 20px;
  text-align:center;cursor:pointer;transition:all .3s;background:rgba(123,63,245,.03);
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--rune-glow);background:rgba(123,63,245,.09);box-shadow:var(--glow);}
.drop-ico{color:var(--rune-glow);margin-bottom:10px;transition:transform .3s;}
.drop-zone:hover .drop-ico{transform:scale(1.12) rotate(-6deg);}
.drop-text{font-size:15px;color:var(--dim);margin-bottom:5px;}
.drop-subtext{font-size:12px;color:rgba(157,140,192,.5);font-style:italic;}
input[type=file]{display:none;}

/* ── FILE INFO ── */
.file-info{display:none;align-items:center;gap:10px;padding:11px 13px;background:rgba(123,63,245,.1);border:1px solid var(--border);border-radius:9px;margin-top:10px;}
.file-info.visible{display:flex;}
.file-ico-wrap{flex-shrink:0;color:var(--rune-bright);}
.file-details{flex:1;min-width:0;}
.file-name{font-family:var(--mono);font-size:13px;color:var(--rune-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-meta{font-size:11px;color:var(--dim);margin-top:2px;}
.file-clear{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px;transition:color .2s;display:flex;align-items:center;}
.file-clear:hover{color:var(--crimson);}

/* ── CONTROLS ── */
.controls-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-top:16px;}
.control-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px;}
.control-label{font-size:10px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;font-family:var(--mono);}
select{background:rgba(10,5,24,.9);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;-webkit-appearance:none;appearance:none;cursor:pointer;transition:all .2s;width:100%;}
select:focus{outline:none;border-color:var(--rune-glow);box-shadow:0 0 10px rgba(168,85,247,.3);}
.select-wrapper{position:relative;}
.select-wrapper::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--rune-glow);pointer-events:none;font-size:13px;}

/* ── BUTTONS ── */
.btn{
  padding:10px 20px;border-radius:9px;border:none;
  font-family:var(--serif);font-size:12px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
}
.btn svg{flex-shrink:0;}
.btn-cast{background:linear-gradient(135deg,#6d28d9 0%,#7c3aed 60%,#8b5cf6 100%);color:#fff;box-shadow:0 4px 16px rgba(109,40,217,.5);}
.btn-cast:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 26px rgba(109,40,217,.7),0 0 34px rgba(168,85,247,.35);}
.btn-break{background:linear-gradient(135deg,#0e7490 0%,#0891b2 60%,#06b6d4 100%);color:#fff;box-shadow:0 4px 16px rgba(8,145,178,.5);}
.btn-break:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 26px rgba(8,145,178,.7),0 0 34px rgba(34,211,238,.35);}
.btn-secondary{background:rgba(123,63,245,.15);color:var(--rune-bright);border:1px solid var(--border);}
.btn-secondary:hover:not(:disabled){background:rgba(123,63,245,.28);border-color:var(--rune-glow);}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important;}

/* ── PROGRESS ── */
.progress-wrap{display:none;margin-top:13px;}.progress-wrap.visible{display:block;}
.progress-label{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:5px;display:flex;justify-content:space-between;}
.progress-bar-bg{height:4px;background:rgba(123,63,245,.2);border-radius:2px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--rune-purple),var(--teal));border-radius:2px;transition:width .3s;box-shadow:0 0 7px rgba(168,85,247,.6);}

/* ── OUTPUT ── */
.spell-output-section{display:none;}.spell-output-section.visible{display:block;}
.spell-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:8px;margin-bottom:13px;}
.stat-card{background:rgba(123,63,245,.08);border:1px solid rgba(123,63,245,.2);border-radius:8px;padding:8px 10px;text-align:center;}
.stat-value{font-family:var(--mono);font-size:13px;color:var(--rune-bright);display:block;word-break:break-all;}
.stat-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;}
.spell-textarea{width:100%;min-height:160px;background:rgba(4,2,10,.88);border:1px solid var(--border);border-radius:9px;color:var(--rune-glow);font-family:var(--mono);font-size:11px;line-height:1.7;padding:13px;resize:vertical;transition:border-color .2s;word-break:break-all;}
.spell-textarea:focus{outline:none;border-color:var(--rune-glow);}
.spell-textarea.decode-input{color:var(--teal);min-height:108px;}
.spell-actions{display:flex;gap:9px;margin-top:10px;flex-wrap:wrap;}

/* ── STATUS ── */
.status-msg{display:none;padding:10px 13px;border-radius:8px;font-family:var(--mono);font-size:12px;margin-top:10px;align-items:center;gap:8px;line-height:1.5;}
.status-msg.visible{display:flex;}
.status-msg svg{flex-shrink:0;}
.status-msg.success{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);}
.status-msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--crimson);}
.status-msg.info{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);color:var(--teal);}

/* ── RUNE PREVIEW ── */
.rune-preview{font-size:17px;letter-spacing:2px;color:var(--rune-glow);text-align:center;padding:8px;border-radius:8px;background:rgba(123,63,245,.05);border:1px solid rgba(123,63,245,.15);font-family:var(--mono);animation:rune-flicker 4s ease-in-out infinite;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:13px;}
@keyframes rune-flicker{0%,94%,100%{opacity:1;}97%{opacity:.62;}}

/* ── INSPECT TABLE ── */
.inspect-table{width:100%;border-collapse:collapse;}
.inspect-table tr{border-bottom:1px solid rgba(123,63,245,.12);}
.inspect-table td{padding:9px 11px;font-size:13px;}
.inspect-table td:first-child{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;width:42%;}
.inspect-table td:last-child{color:var(--rune-bright);font-family:var(--mono);}

/* ── PARTICLE ── */
.particle{position:fixed;pointer-events:none;z-index:9999;animation:float-up 1.4s ease-out forwards;}

// ── MIME → SVG アイコン ID マッピング ──────────
var MIME_ICO={
  'image/':'ico-image','video/':'ico-video','audio/':'ico-music',
  'application/pdf':'ico-pdf','application/zip':'ico-archive',
  'application/gzip':'ico-archive','text/':'ico-text'

function mimeToIcoId(m){
  for(var k in MIME_ICO){if(m.startsWith(k)||m===k)return MIME_ICO[k];}
  return'ico-file';
}

// ── CRC32 ──────────────────────────────────────
var CRC32T=(function(){var t=new Uint32Array(256);for(var i=0;i<256;i++){var c=i;for(var j=0;j<8;j++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c;}return t;})();
function crc32(d){var c=0xFFFFFFFF;for(var i=0;i<d.length;i++)c=CRC32T[(c^d[i])&0xFF]^(c>>>8);return((c^0xFFFFFFFF)>>>0).toString(16).padStart(8,'0').slice(-4);}

// ── COMPRESSION ────────────────────────────────
var HAS_COMP=(typeof CompressionStream!=='undefined');
async function compress(u8){
  if(!HAS_COMP)return u8;
  try{var cs=new CompressionStream('deflate');var w=cs.writable.getWriter();w.write(u8);w.close();
    var ch=[],r=cs.readable.getReader();for(;;){var x=await r.read();if(x.done)break;ch.push(x.value);}
    var tot=ch.reduce(function(s,c){return s+c.length;},0),out=new Uint8Array(tot),off=0;
    ch.forEach(function(c){out.set(c,off);off+=c.length;});return out;}catch(e){return u8;}
}
async function decompress(u8){
  if(!HAS_COMP)return u8;
  try{var ds=new DecompressionStream('deflate');var w=ds.writable.getWriter();w.write(u8);w.close();
    var ch=[],r=ds.readable.getReader();for(;;){var x=await r.read();if(x.done)break;ch.push(x.value);}
    var tot=ch.reduce(function(s,c){return s+c.length;},0),out=new Uint8Array(tot),off=0;
    ch.forEach(function(c){out.set(c,off);off+=c.length;});return out;}catch(e){return null;}
}

var MM={jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',webp:'image/webp',svg:'image/svg+xml',

var EM={};Object.keys(MM).forEach(function(k){if(!EM[MM[k]])EM[MM[k]]=k;});
var SKIP={};['image/jpeg','image/png','image/gif','image/webp','video/mp4','video/webm','video/quicktime','video/x-msvideo','audio/mpeg','audio/aac','audio/ogg','audio/flac','application/zip','application/gzip'].forEach(function(m){SKIP[m]=1;});

function fmtB(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';if(n<1073741824)return(n/1048576).toFixed(1)+' MB';return(n/1073741824).toFixed(2)+' GB';}

// ── SVG ICON INLINE HELPER ─────────────────────
function icoSvg(id,size){
  size=size||16;
  return'<svg width="'+size+'" height="'+size+'" style="display:inline-block;vertical-align:middle;flex-shrink:0"><use href="#'+id+'"/></svg>';

// ── RUNE ENCODE / DECODE ───────────────────────
function runeEncode(bytes,rsId){
  var rs=RUNE_SETS[rsId];if(!rs)throw new Error('SPELL_003: 不明な符文セット: '+rsId);
  var C=rs.chars,P=rs.pad,out='';
  for(var i=0;i<bytes.length;i+=3){
    var b0=bytes[i],b1=i+1<bytes.length?bytes[i+1]:0,b2=i+2<bytes.length?bytes[i+2]:0;
    out+=C[b0>>2];out+=C[((b0&3)<<4)|(b1>>4)];
    out+=(i+1<bytes.length)?C[((b1&0xF)<<2)|(b2>>6)]:P;
    out+=(i+2<bytes.length)?C[b2&0x3F]:P;
  }
  return out;
}
function runeDecode(str,rsId){
  var rs=RUNE_SETS[rsId];if(!rs)throw new Error('SPELL_003: 不明な符文セット: '+rsId);
  var rev={};rs.chars.forEach(function(c,i){rev[c]=i;});rev[rs.pad]=-1;
  var gl=[...str],bytes=[];
  for(var i=0;i<gl.length;i+=4){
    var c0=rev[gl[i]],c1=rev[gl[i+1]];
    var c2=(i+2<gl.length)?rev[gl[i+2]]:-1;
    var c3=(i+3<gl.length)?rev[gl[i+3]]:-1;
    if(c0==null||c1==null)continue;
    bytes.push((c0<<2)|(c1>>4));
    if(c2!==-1&&c2!=null)bytes.push(((c1&0xF)<<4)|(c2>>2));
    if(c3!==-1&&c3!=null)bytes.push(((c2&3)<<6)|c3);
  }
  return new Uint8Array(bytes);
}
function detectRuneSet(body){
  var gl=[...body].slice(0,40),best='glypho64',bs=0;
  Object.keys(RUNE_SETS).forEach(function(id){
    var rs=RUNE_SETS[id],cs={};rs.chars.forEach(function(c){cs[c]=1;});cs[rs.pad]=1;
    var s=gl.filter(function(g){return cs[g];}).length;if(s>bs){bs=s;best=id;}
  });
  return best;
}

// ── SPELL FORMAT ───────────────────────────────
function buildSpell(cb,mime,origSz,cs,rsId){
  return'⟁SPELL:v1:'+rsId+':'+mime+':'+origSz+':'+cs+'⟁\n'+runeEncode(cb,rsId)+'\n⌬END:'+cs+'⌬';
}
function parseSpell(s){
  var m=s.match(/⟁SPELL:([^:]+):([^:]+):([^:⟁]+):(\d+):([a-f0-9]{4})⟁/);
  if(!m)throw new Error('SPELL_001: 召喚符が見つかりません。正しい呪文か確認してください');
  var fm=s.match(/⌬END:([a-f0-9]{4})⌬/);
  if(!fm)throw new Error('SPELL_001: 封印符が見つかりません。呪文が不完全です');
  var hEnd=s.indexOf(m[0])+m[0].length,bEnd=s.lastIndexOf('⌬END:');
  var body=s.slice(hEnd,bEnd).replace(/[\r\n\t ]/g,'');
  return{ver:m[1],rsId:m[2],mime:m[3],origSz:parseInt(m[4]),cs:m[5],body:body};
}

// ── PARTICLES ─────────────────────────────────
function spawnParts(e){
  var symbols=['✦','⟁','ᛟ','★','◈','⌬','⊹','∴','☽'];
  for(var i=0;i<6;i++){
    var p=document.createElement('div');p.className='particle';
    // SVGとテキスト交互
    if(i%2===0){
      var s=document.createElementNS('http://www.w3.org/2000/svg','svg');
      s.setAttribute('width','14');s.setAttribute('height','14');
      s.style.color='rgba(168,85,247,0.9)';
      var u=document.createElementNS('http://www.w3.org/2000/svg','use');
      u.setAttribute('href',i===0?'#ico-spark':'#ico-star4');
      s.appendChild(u);p.appendChild(s);
    }else{
      p.style.fontSize='15px';p.style.color='rgba(168,85,247,0.8)';
      p.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    }
    p.style.left=(e.clientX+(Math.random()-.5)*56)+'px';
    p.style.top=(e.clientY+(Math.random()-.5)*34)+'px';
    document.body.appendChild(p);
    (function(el){setTimeout(function(){el.parentNode&&el.parentNode.removeChild(el);},1400);})(p);
  }
}
document.addEventListener('click',function(e){
  if(e.target.closest('.btn-cast,.btn-break'))spawnParts(e);
});

// ── FILE SELECT / DROP ─────────────────────────
var dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files.length)loadFile(e.dataTransfer.files[0]);});
function onFileSelect(e){if(e.target.files.length)loadFile(e.target.files[0]);}
function loadFile(f){
  curFile=f;var mime=detectMime(f.name);
  var icoId=mimeToIcoId(mime);
  document.getElementById('file-icon-use').setAttribute('href','#'+icoId);
  document.getElementById('file-name').textContent=f.name;
  document.getElementById('file-meta').textContent=fmtB(f.size)+' · '+mime;
  document.getElementById('file-info').classList.add('visible');
  document.getElementById('btn-cast').disabled=false;
  clrStatus('cast-status');document.getElementById('cast-output').classList.remove('visible');
}
function clearFile(){
  curFile=null;document.getElementById('file-info').classList.remove('visible');
  document.getElementById('btn-cast').disabled=true;document.getElementById('file-input').value='';
}
function updateRunePreview(){
  var rs=RUNE_SETS[document.getElementById('rune-set').value];
  document.getElementById('rune-preview').textContent=rs.chars.slice(0,24).join('');
}

// ── CAST ───────────────────────────────────────
async function castSpell(){
  if(!curFile)return;
  var rsId=document.getElementById('rune-set').value;
  var cm=document.getElementById('compress-mode').value;
  document.getElementById('btn-cast').disabled=true;
  clrStatus('cast-status');document.getElementById('cast-output').classList.remove('visible');
  try{
    setProg('cast',10,'ファイルを読み込み中...');
    var buf=await curFile.arrayBuffer();var bytes=new Uint8Array(buf);
    setProg('cast',25,'チェックサムを計算中...');await tick();
    var cs=crc32(bytes);var mime=detectMime(curFile.name);var origSz=bytes.length;
    var useC=(cm==='none')?false:(cm==='deflate'?true:!SKIP[mime]);
    setProg('cast',45,useC?'圧縮中 (DEFLATE)...':'圧縮スキップ（既圧縮形式）');await tick();
    var proc=bytes,didC=false;
    if(useC){var comp=await compress(bytes);if(comp.length<bytes.length){proc=comp;didC=true;}}
    setProg('cast',70,'符文エンコード中...');await tick();
    var spell=buildSpell(proc,mime,origSz,cs,rsId);
    setProg('cast',96,'呪文を封印中...');await tick();
    curSpell=spell;document.getElementById('spell-output-text').value=spell;
    var ratio=(([...spell].length)/origSz*100).toFixed(1);
    document.getElementById('cast-stats').innerHTML=
      statCard(fmtB(origSz),'元サイズ')+statCard(fmtB(proc.length),didC?'圧縮後':'処理後')+
      statCard(([...spell].length).toLocaleString(),'呪文文字数')+statCard(ratio+'%','比率')+
      statCard(cs,'チェックサム')+statCard(RUNE_SETS[rsId].name,'符文セット');
    setProg('cast',100,'完了！');setTimeout(function(){clrProg('cast');},700);
    document.getElementById('cast-output').classList.add('visible');
    setStatus('cast-status','success','詠唱完了！ '+curFile.name+' を呪文化しました');
  }catch(err){clrProg('cast');setStatus('cast-status','error',err.message);}
  finally{document.getElementById('btn-cast').disabled=false;}
}
async function copySpell(){
  if(!curSpell)return;
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(curSpell);}
    else{var ta=document.getElementById('spell-output-text');ta.select();ta.setSelectionRange(0,999999);document.execCommand('copy');}
    setStatus('cast-status','success','クリップボードにコピーしました！');
  }catch(e){setStatus('cast-status','info','テキストを手動で選択してコピーしてください。');}
}
function downloadSpell(){
  if(!curSpell)return;
  triggerDL(new Blob([curSpell],{type:'text/plain;charset=utf-8'}),(curFile?curFile.name.replace(/\.[^.]+$/,''):'spell')+'.spell');
}

// ── BREAK ──────────────────────────────────────
async function breakSpell(){
  var st=document.getElementById('spell-input-text').value.trim();
  if(!st){setStatus('break-status','error','呪文を入力してください');return;}
  clrStatus('break-status');document.getElementById('break-output').classList.remove('visible');
  try{
    setProg('break',15,'呪文を解析中...');await tick();
    var p=parseSpell(st);
    setProg('break',35,'符文セットを判別中...');await tick();
    var rsId=(p.rsId in RUNE_SETS)?p.rsId:detectRuneSet(p.body);
    setProg('break',55,'符文をデコード中...');await tick();
    var cb=runeDecode(p.body,rsId);
    setProg('break',72,'解凍中...');await tick();
    var bytes=await decompress(cb);
    if(!bytes||bytes.length===0||bytes.length<cb.length)bytes=cb;
    setProg('break',88,'チェックサム照合中...');await tick();
    var cs=crc32(bytes);var csOk=(cs===p.cs);
    setProg('break',100,'完了！');setTimeout(function(){clrProg('break');},700);
    var ext=mimeToExt(p.mime);
    restName='restored.'+ext;restBlob=new Blob([bytes],{type:p.mime});
    var icoId=mimeToIcoId(p.mime);
    document.getElementById('break-stats').innerHTML=
      '<div class="stat-card"><span class="stat-value">'+icoSvg(icoId,22)+'</span><span class="stat-label">種別</span></div>'+
      statCard(fmtB(bytes.length),'復元サイズ')+statCard(p.mime,'MIME')+
      statCard(p.cs,'CRC '+(csOk?'✓':'⚠'))+
      statCard(RUNE_SETS[rsId]?RUNE_SETS[rsId].name:rsId,'符文セット')+
      statCard('.'+ext,'拡張子');
    document.getElementById('break-output').classList.add('visible');
    setStatus('break-status','success','解呪完了！ '+restName+' を復元しました'+(csOk?'':' — チェックサム不一致'));
  }catch(err){clrProg('break');setStatus('break-status','error',err.message);}
}
function downloadRestored(){if(restBlob)triggerDL(restBlob,restName);}

// ── INSPECT ────────────────────────────────────
function inspectSpell(){
  var st=document.getElementById('inspect-input-text').value.trim();
  if(!st){setStatus('inspect-status','error','呪文を入力してください');return;}
  clrStatus('inspect-status');document.getElementById('inspect-output').classList.remove('visible');
  try{
    var p=parseSpell(st);
    var rsId=(p.rsId in RUNE_SETS)?p.rsId:detectRuneSet(p.body);
    var icoId=mimeToIcoId(p.mime);
    document.getElementById('inspect-table').innerHTML=
      trow('バージョン',esc(p.ver))+
      trow('ファイル種別',icoSvg(icoId,14)+' '+esc(p.mime))+
      trow('元サイズ',esc(fmtB(p.origSz)+' ('+p.origSz.toLocaleString()+' bytes)'))+
      trow('呪文文字数',esc([...st].length.toLocaleString()+' 文字'))+
      trow('本文符文数',esc([...p.body].length.toLocaleString()+' 符文'))+
      trow('符文セット',esc(RUNE_SETS[rsId]?RUNE_SETS[rsId].name:rsId))+
      trow('チェックサム',esc(p.cs))+
      trow('拡張子（推定）',esc('.'+mimeToExt(p.mime)));
    document.getElementById('inspect-output').classList.add('visible');
    setStatus('inspect-status','success','鑑定完了！');
  }catch(err){setStatus('inspect-status','error',err.message);}
}

// ── STARS ──────────────────────────────────────
(function(){
  var cv=document.getElementById('stars-canvas'),ctx=cv.getContext('2d'),st=[];
  function resize(){
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    st=Array.from({length:130},function(){
      return{x:Math.random()*cv.width,y:Math.random()*cv.height,
             r:Math.random()*1.3+.2,sp:Math.random()*.005+.001,ph:Math.random()*Math.PI*2};
    });
  }
  function draw(t){
    ctx.clearRect(0,0,cv.width,cv.height);
    st.forEach(function(s){
      var a=.2+.5*Math.sin(s.ph+t*s.sp);
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(216,180,254,'+a+')';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();requestAnimationFrame(draw);
})();

updateRunePreview();
</script>
